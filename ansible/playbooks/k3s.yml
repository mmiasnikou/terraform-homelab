---
# PLAY 1 — CONTROL-PLANE (первым, целиком)
- name: Upgrade/Install k3s control-plane
  hosts: k3s_cp
  become: true
  gather_facts: yes
  roles:
    - k3s

# PLAY 2 — собрать token/cp-ip для воркеров
- name: Gather k3s join facts for workers
  hosts: k3s_workers
  become: true
  gather_facts: yes
  tasks:
    - name: Read node-token from control-plane
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token
      delegate_to: "{{ groups['k3s_cp'][0] }}"
      run_once: true
    - name: Set join facts
      set_fact:
        k3s_node_token: "{{ k3s_token['content'] | b64decode | trim }}"
        k3s_cp_ip: "{{ hostvars[groups['k3s_cp'][0]]['ansible_default_ipv4']['address'] }}"

# PLAY 3 — WORKERS по одному, с drain/uncordon
- name: Upgrade k3s workers one at a time
  hosts: k3s_workers
  become: true
  gather_facts: yes
  serial: 1
  max_fail_percentage: 0
  pre_tasks:
    - name: Check if node is already registered
      command: kubectl get node {{ inventory_hostname }}
      delegate_to: localhost
      become: false
      register: node_registered
      failed_when: false
      changed_when: false
    - name: Drain node before upgrade
      command: >
        kubectl drain {{ inventory_hostname }}
        --ignore-daemonsets --delete-emptydir-data --timeout=120s
      delegate_to: localhost
      become: false
      when: node_registered.rc == 0
  roles:
    - k3s
  post_tasks:
    - name: Wait for node to report target version
      command: kubectl get node {{ inventory_hostname }} -o jsonpath={.status.nodeInfo.kubeletVersion}
      delegate_to: localhost
      become: false
      register: node_ver
      until: node_ver.stdout == k3s_version
      retries: 20
      delay: 10
    - name: Uncordon node
      command: kubectl uncordon {{ inventory_hostname }}
      delegate_to: localhost
      become: false
      when: node_registered.rc == 0
