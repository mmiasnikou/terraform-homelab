---
- name: Install Docker prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: false

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Install Docker engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Ensure docker service is running
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Add mik to docker group
  user:
    name: mik
    groups: docker
    append: yes

- name: Install Python docker library (for Ansible docker module)
  apt:
    name:
      - python3-docker
    state: present

- name: Create Forgejo install dir
  file:
    path: "{{ forgejo_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create Forgejo data dir
  file:
    path: "{{ forgejo_data_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: '0755'

- name: Deploy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ forgejo_install_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0644'
  notify: restart forgejo

- name: Start Forgejo via docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ forgejo_install_dir }}"
    state: present

- name: Wait for Forgejo to be ready
  uri:
    url: "http://localhost:{{ forgejo_http_port }}/"
    status_code: 200
  retries: 30
  delay: 2
  register: result
  until: result.status == 200
- name: Create backup directory
  file:
    path: "{{ forgejo_backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Deploy backup script
  template:
    src: backup.sh.j2
    dest: /usr/local/bin/forgejo-backup.sh
    owner: root
    group: root
    mode: '0750'

- name: Schedule daily backup via cron
  cron:
    name: "Forgejo daily backup"
    minute: "0"
    hour: "3"
    job: "/usr/local/bin/forgejo-backup.sh"
    user: root
