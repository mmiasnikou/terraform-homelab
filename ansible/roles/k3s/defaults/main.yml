---
# Версия k3s. Апгрейд = поменять здесь и прогнать плейбук (с serial/drain — TODO).
k3s_version: "v1.34.8+k3s1"
k3s_install_url: "https://get.k3s.io"

# Компоненты, отключаемые на control-plane (попадают в config.yaml).
# traefik отключён — ingress-контроллером выступает ingress-nginx.
k3s_server_disable:
  - traefik

k3s_kubeconfig_mode: "644"
