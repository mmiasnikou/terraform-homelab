---
# ===================== CONTROL-PLANE =====================
- name: Ensure /etc/rancher/k3s exists on control-plane
  file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"
  when: inventory_hostname in groups['k3s_cp']

- name: Template k3s server config.yaml
  template:
    src: config-server.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0600"
  when: inventory_hostname in groups['k3s_cp']
  notify: restart k3s server

- name: Install or upgrade k3s server
  shell: |
    curl -sfL {{ k3s_install_url }} | INSTALL_K3S_VERSION={{ k3s_version }} sh -s - server
  register: k3s_server_install
  changed_when: "'No change detected' not in k3s_server_install.stdout"
  when: inventory_hostname in groups['k3s_cp']

- name: Wait for k3s API to be ready
  wait_for:
    port: 6443
    host: "{{ ansible_default_ipv4.address }}"
    delay: 5
    timeout: 180
  when: inventory_hostname in groups['k3s_cp']

# ===================== TOKEN / CP-IP =====================
- name: Read node-token from control-plane
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token
  when: inventory_hostname in groups['k3s_cp']

- name: Set token and cp-ip facts across all hosts
  set_fact:
    k3s_node_token: "{{ hostvars[groups['k3s_cp'][0]]['k3s_token']['content'] | b64decode | trim }}"
    k3s_cp_ip: "{{ hostvars[groups['k3s_cp'][0]]['ansible_default_ipv4']['address'] }}"

# ===================== WORKERS (AGENTS) =====================
- name: Ensure /etc/rancher/k3s exists on workers
  file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"
  when: inventory_hostname in groups['k3s_workers']

- name: Template k3s agent config.yaml
  template:
    src: config-agent.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0600"
  when: inventory_hostname in groups['k3s_workers']
  notify: restart k3s agent

- name: Install or upgrade k3s agent
  shell: |
    curl -sfL {{ k3s_install_url }} | INSTALL_K3S_VERSION={{ k3s_version }} INSTALL_K3S_EXEC=agent sh -s -
  register: k3s_agent_install
  changed_when: "'No change detected' not in k3s_agent_install.stdout"
  when: inventory_hostname in groups['k3s_workers']

# ===================== KUBECONFIG → lab-control =====================
- name: Fetch kubeconfig to lab-control
  fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ lookup('env', 'HOME') }}/.kube/config-k3s-lab"
    flat: yes
  when: inventory_hostname in groups['k3s_cp']

- name: Replace localhost with cp IP in fetched kubeconfig
  delegate_to: localhost
  become: false
  replace:
    path: "{{ lookup('env', 'HOME') }}/.kube/config-k3s-lab"
    regexp: "127.0.0.1"
    replace: "{{ ansible_default_ipv4.address }}"
  when: inventory_hostname in groups['k3s_cp']
