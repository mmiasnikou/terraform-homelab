# SealedSecret with Jenkins admin credentials.
# Deployed before Jenkins (sync-wave -1 on the resource) so existingSecret exists.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-secret
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: jenkins
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/mmiasnikou/terraform-homelab
    targetRevision: main
    path: k8s/jenkins
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
