# Kafka cluster CRs (Kafka, KafkaNodePool, KafkaTopic).
# sync-wave 1: applied after the operator/CRDs exist.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: kafka
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/mmiasnikou/terraform-homelab
    targetRevision: main
    path: k8s/kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
