# Strimzi Kafka operator (Helm chart from OCI registry).
# sync-wave 0: installs CRDs and the operator before any Kafka CRs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: kafka
    server: https://kubernetes.default.svc
  source:
    repoURL: quay.io/strimzi-helm
    chart: strimzi-kafka-operator
    targetRevision: 1.1.0
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
