# App-of-apps: корневой Application, управляющий остальными
# Application-манифестами в k8s/argocd-apps/.
# Правка манифеста в каталоге → коммит → ArgoCD применяет автоматически.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/mmiasnikou/terraform-homelab
    targetRevision: main
    path: k8s/argocd-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
