# App-of-apps: корневой Application, управляющий всеми остальными
# Application-манифестами в каталоге k8s/argocd-apps/.
# Правка любого манифеста в этом каталоге → коммит → ArgoCD применяет.
# Ручной kubectl apply больше не нужен.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/mmiasnikou/terraform-homelab
    targetRevision: main
    path: k8s/argocd-apps
    directory:
      recurse: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
