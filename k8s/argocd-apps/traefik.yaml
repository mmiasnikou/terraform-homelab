apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  destination:
    namespace: traefik
    server: https://kubernetes.default.svc
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 40.2.0
    helm:
      valuesObject:
        ingressClass:
          enabled: true
          isDefaultClass: true
          name: traefik
        providers:
          kubernetesIngress:
            enabled: true
          kubernetesCRD:
            enabled: true
