apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  destination:
    namespace: traefik
    server: https://kubernetes.default.svc
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 40.2.0
    helm:
      valuesObject:
        ingressClass:
          enabled: true
          isDefaultClass: false
          name: traefik
        service:
          type: NodePort
          # Запрещаем k3s ServiceLB (klipper) навешивать LoadBalancer и
          # занимать хостовые 80/443 — Traefik должен жить строго на NodePort.
          annotations:
            svccontroller.k3s.cattle.io/enablelb: "false"
        ports:
          web:
            nodePort: 31080
          websecure:
            nodePort: 31443
        providers:
          kubernetesIngress:
            enabled: true
          kubernetesCRD:
            enabled: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
