apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  destination:
    namespace: traefik
    server: https://kubernetes.default.svc
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 40.2.0
    helm:
      valuesObject:
        # Traefik на стандартных 80/443 через k3s ServiceLB (klipper).
        # nginx доживает на 30080/30443 до Фазы 4.
        ingressClass:
          enabled: true
          isDefaultClass: true
          name: traefik
        providers:
          kubernetesIngress:
            enabled: true
          kubernetesCRD:
            enabled: true
        # Отключаем то, что нам не нужно и расширяет поверхность:
        providers_gateway: {}   # placeholder, см. ниже
