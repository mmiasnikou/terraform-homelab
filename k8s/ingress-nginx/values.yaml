controller:
  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443

  replicaCount: 1

  ingressClassResource:
    name: nginx
    enabled: true
    default: true

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring
      additionalLabels:
        release: kps

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
