# Kafka cluster (KRaft mode) managed by Strimzi operator.
# Single dual-role node (controller + broker), sized for a small homelab node.
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: dual
  namespace: kafka
  labels:
    strimzi.io/cluster: homelab
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: persistent-claim
    size: 10Gi
    class: local-path
    deleteClaim: false
  resources:
    requests:
      memory: 512Mi
      cpu: "250m"
    limits:
      memory: 768Mi
  jvmOptions:
    -Xms: 256m
    -Xmx: 256m
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: homelab
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.3.0
    metadataVersion: 4.3-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator:
      resources:
        requests:
          memory: 256Mi
          cpu: "100m"
        limits:
          memory: 384Mi
    userOperator:
      resources:
        requests:
          memory: 256Mi
          cpu: "100m"
        limits:
          memory: 384Mi
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: demo
  namespace: kafka
  labels:
    strimzi.io/cluster: homelab
spec:
  partitions: 3
  replicas: 1
